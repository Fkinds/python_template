[project]
name = "fkinds-python"
version = "0.1.0"
requires-python = ">=3.14"
description = ""
authors = [
    { name = "fkinds", email = "wkhs.1020@gmail.com" }
]
readme = "README.md"
dependencies = [
    "attrs>=25.4.0",
    "django>=5.2",
    "django-environ>=0.12",
    "django-storages[s3]>=1.14",
    "djangorestframework>=3.16",
    "elasticsearch>=8.17,<9",
    "httpx>=0.28",
    "injector>=0.22.0",
    "fixit>=2.1.0",
    "import-linter>=2.5.2",
    "mypy>=1.18.2",
    "pillow>=11.0",
    "pre-commit>=4.3.0",
    "psycopg[binary]>=3.2",
    "pydantic>=2.12.3",
    "pyrefly>=0.53.0",
    "pytest>=8.4.2",
    "pytest-cov>=7.0.0",
    "ruff>=0.14.3",
    "ty>=0.0.17",
    "uv>=0.10.4",
]

[tool.setuptools.packages.find]
where = ["src"]

[dependency-groups]
dev = [
    "pytest",
    "pytest-django",
    "pytest-xdist",
    "hypothesis",
    "ruff",
    "mypy",
    "django-stubs",
    "djangorestframework-stubs",
    "pre-commit",
    "moto[s3]",
]

[tool.ruff]
line-length = 79
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "S",      # flake8-bandit (security)
    "N",      # pep8-naming
    "SIM",    # flake8-simplify
    "T20",    # flake8-print
    "ERA",    # eradicate (commented-out code)
    "PT",     # flake8-pytest-style
    "RET",    # flake8-return
    "ARG",    # flake8-unused-arguments
    "PIE",    # flake8-pie
    "PERF",   # perflint
    "RUF",    # Ruff-specific rules
]
ignore = [
    "RUF012",  # Django Meta / ModelSerializer „Åß ClassVar ‰∏çË¶Å
    "PIE790",  # docstring „ÅÆ„Åø„ÅÆ„ÇØ„É©„Çπ„Åß„ÇÇ pass „ÇíÊòéÁ§∫„Åô„Çã
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true
docstring-code-line-length = "dynamic"

[tool.ruff.lint.isort]
known-first-party = ["config", "authors", "books", "notifications"]
force-single-line = true

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = [
    "S101",    # assert „ÅÆ‰ΩøÁî®„ÇíË®±ÂèØ
    "S105",    # „ÉÜ„Çπ„ÉàÁî®„Éè„Éº„Éâ„Ç≥„Éº„Éâ„Éë„Çπ„ÉØ„Éº„Éâ„ÇíË®±ÂèØ
    "S106",    # „ÉÜ„Çπ„ÉàÁî®„Éè„Éº„Éâ„Ç≥„Éº„Éâ„Éë„Çπ„ÉØ„Éº„ÉâÂºïÊï∞„ÇíË®±ÂèØ
    "ARG",     # Êú™‰ΩøÁî®ÂºïÊï∞ (fixtureÁ≠â)
    "T20",     # print „ÅÆ‰ΩøÁî®„ÇíË®±ÂèØ
]
"manage.py" = ["T20"]
"**/migrations/*.py" = ["ALL"]
"lint_rules/**/*.py" = [
    "N802",    # libcst visitor methods are camelCase (visit_XXX)
    "ERA001",  # visitor comments detected as commented-out code
]

[tool.fixit]
root = true
python-version = "3.14"
enable = [
    "fixit.rules",
    "fixit.rules.extra",
    ".lint_rules",
]
disable = [
    "fixit.rules:ReplaceUnionWithOptional",
    "fixit.rules:RewriteToLiteral",
    "fixit.rules.extra:UseLintFixmeComment",
]

[[tool.fixit.overrides]]
path = "tests"
disable = [
    "fixit.rules:UseAssertIn",
    "fixit.rules:UseAssertIsNotNone",
    "fixit.rules:NoAssertTrueForComparisons",
]

[tool.mypy]
python_version = "3.14"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
show_error_codes = true
plugins = ["mypy_django_plugin.main"]

[tool.django-stubs]
django_settings_module = "config.settings.dev"

[[tool.mypy.overrides]]
module = "environ"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["storages.*", "boto3.*", "botocore.*", "moto.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "injector"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "elasticsearch"
ignore_missing_imports = true

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.dev"
pythonpath = ["src"]
addopts = "--import-mode=importlib --cov=src --cov-report=term-missing --strict-markers"
markers = [
    "unit: „É¶„Éã„ÉÉ„Éà„ÉÜ„Çπ„Éà (DB/„Éç„ÉÉ„Éà„ÉØ„Éº„ÇØ‰∏çË¶Å)",
    "integration: Áµ±Âêà„ÉÜ„Çπ„Éà (Â§ñÈÉ®„Çµ„Éº„Éì„Çπ„É¢„ÉÉ„ÇØ‰ΩøÁî®)",
    "functional: Ê©üËÉΩ„ÉÜ„Çπ„Éà (Django DB + APIClient ‰ΩøÁî®)",
    "linting: lint „É´„Éº„É´„ÉÜ„Çπ„Éà (Á¥îÁ≤ã Python AST Ê§úÊüª)",
]

[tool.coverage.run]
source = ["src"]
omit = [
    "*/migrations/*",
    "*/wsgi.py",
    "*/asgi.py",
    "*/manage.py",
]

[tool.coverage.report]
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
]

[tool.ty.rules]
unused-type-ignore-comment = "ignore"

[tool.ty.environment]
python-version = "3.14"

[tool.ty.src]
include = ["src"]

[tool.pyrefly]
project_includes = ["src/**/*.py", "tests/**/*.py"]
python_version = "3.14"
ignore_errors = ["bad-override", "missing-attribute"]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-django",
    "pytest-xdist",
    "hypothesis",
    "ruff",
    "mypy",
    "django-stubs",
    "djangorestframework-stubs",
    "pre-commit",
    "moto[s3]",
]

[tool.importlinter]
root_packages = [
    "config",
    "common",
    "authors",
    "books",
    "notifications",
]
include_external_packages = true

[[tool.importlinter.contracts]]
name = "Notifications DDD layers"
type = "layers"
layers = [
    "notifications.infrastructure",
    "notifications.interfaces",
    "notifications.usecases",
    "notifications.domain",
]

[[tool.importlinter.contracts]]
name = "Common DDD layers"
type = "layers"
layers = [
    "common.infrastructure",
    "common.interfaces",
    "common.usecases",
    "common.domain",
]

[[tool.importlinter.contracts]]
name = "Domain layer purity"
type = "forbidden"
source_modules = [
    "notifications.domain",
    "common.domain",
]
forbidden_modules = [
    "django",
    "rest_framework",
    "injector",
    "pydantic",
    "httpx",
]

[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"
