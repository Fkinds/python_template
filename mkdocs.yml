site_name: fkinds-python docs
site_description: Django REST Framework API template documentation
docs_dir: docs
site_dir: site

theme:
  name: material
  language: ja
  palette:
    - scheme: default
      primary: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.top
    - content.code.copy

plugins:
  - search
  # .claude/ 配下のルール/スキルを単一ソースのまま取り込む（transclude）
  - include-markdown

# メニュー（目次）は nav で管理する
nav:
  - Home: index.md
  - CLAUDE.md: claude-md.md
  - Rules:
      - 概要: rules/index.md
      - ワークフロー: rules/workflow.md
      - Python 規約: rules/python-conventions.md
      - DDD レイヤ構造: rules/ddd-architecture.md
      - DDD ドメイン設計: rules/ddd-domain-design.md
      - DDD コンテキスト境界: rules/ddd-context-boundary-design.md
      - 例外アーキテクチャ: rules/exception-architecture.md
      - セキュリティ: rules/security.md
      - テスト戦略: rules/test-strategy.md
  - Skills:
      - 概要: skills/index.md
      - コード品質: skills/code-quality.md
      - デザインパターン: skills/design-patterns.md
      - セキュリティ: skills/security.md
      - テストコード品質: skills/test-code-quality.md
      - ユニットテスト戦略: skills/unit-testing-strategy.md
      - Lint 修正: skills/lint-fix.md
      - テスト実行: skills/run-tests.md
      - マイグレーション作成: skills/create-migration.md
  - ADR:
      - 概要: adr/README.md
      - テンプレート: adr/template.md
      - Current:
          - "ADR-0001 domain=attrs / DTO=pydantic": adr/current/0001-domain-attrs-dto-pydantic.md
          - "ADR-0002 AppError ピラミッド / RFC9457": adr/current/0002-app-error-pyramid-rfc9457.md
          - "ADR-0003 Enum 既定 / StrEnum 例外": adr/current/0003-enum-default-strenum-exception.md
          - "ADR-0004 Bounded Context / import-linter": adr/current/0004-bounded-context-import-linter.md
          - "ADR-0005 テストサイズ分類": adr/current/0005-test-size-classification.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
