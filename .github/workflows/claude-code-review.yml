name: Claude Code Review

# PR のコードレビューを Claude Code に実行させる。
# 認証は Claude サブスク（Pro/Max）の OAuth トークンを使う。
# 有効化手順:
#   1. ローカルで `claude setup-token` を実行しトークンを取得（ブラウザ認証）
#   2. リポジトリの Settings > Secrets and variables > Actions に
#      `CLAUDE_CODE_OAUTH_TOKEN` として登録
# 未登録なら secret が空になり、下の if 条件でジョブがスキップされる。
#
# 【仕様メモ】このワークフローファイル自身を変更する PR では、
# claude-code-action の workflow validation によりレビューが実行されず
# 自己スキップする（ジョブは exit 0 のまま）。ワークフロー変更 PR で
# レビューコメントが出ないのは異常ではなく正常な挙動。

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# 既定の GITHUB_TOKEN 権限を最小化しつつ、必要な権限のみ付与。
# id-token: write は claude-code-action が OAuth トークン認証で
# OIDC トークンを取得するために必須。
permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    # draft PR・bot 起票の PR ではスキップ
    if: >-
      github.event.pull_request.draft == false &&
      github.event.sender.type != 'Bot'
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    env:
      # secret が未設定なら 'false' になり、下のステップがスキップされる。
      # スキップされたジョブは GitHub 上 Success 扱いのため、必須チェック
      # （#144 で required 化）でも未設定時に PR をブロックしない。
      has_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
    steps:
      - name: Checkout
        if: env.has_token == 'true'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Claude Code Review
        id: review
        if: env.has_token == 'true'
        uses: anthropics/claude-code-action@b76a0776ae74036e77cd11018083743453d7ad35 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          # 再実行のたびにスタブコメントを増殖させず、単一コメントを更新する
          use_sticky_comment: true
          prompt: |
            あなたはこの Django REST Framework テンプレート（Python 3.14 /
            strict MyPy）の code reviewer です。`.claude/agents/code-reviewer.md`
            のチェックリストと `.claude/rules/` の各ルールに沿って、この PR の
            差分をレビューしてください。特に次の観点を確認します:

            - 型注釈（MyPy strict）/ 行長 79 / ダブルクォート / 単一行 import
            - 値オブジェクトは `attrs.frozen(kw_only=True)`、common スーパータイプ継承
            - ビジネスロジックは domain/ に置き、models/serializers/usecases に
              流出していないか（ドメインモデル貧血症の禁止）
            - 例外は AppError ピラミッド経由、5xx で detail/traceback を漏らさない
            - serializer は fields 明示 + read_only_fields、"__all__" 禁止
            - コンテキスト境界を越える import（他 context の domain/）が無いか
            - テストは Arrange-Act-Assert、`test_happy_*` / `test_error_*` 接頭辞、
              domain/usecases テストは Small（DB / I/O / clock 不使用）

            指摘は日本語で、該当ファイル・行を添えて簡潔に。問題が無ければ
            その旨を伝えてください。

      # トークン失効時、上のレビューステップは Claude Code SDK が is_error で
      # 即終了しても exit 0（緑）のまま終わり、レビューが投稿されない。
      # 必須チェック化しても「緑だが未レビュー」がすり抜けるため、実行結果
      # JSON の最終結果（type == "result"）の is_error を検査し、失効等の
      # エラー時はジョブを fail させる。中間の tool_result オブジェクトも
      # is_error を持つ（レビュー中にツールが非0終了した等）が、それは
      # レビュー成否とは無関係なので type == "result" のみを対象にする。
      # 実行結果ファイルが無い/空（ワークフロー自己スキップ等）の場合は
      # 何も判定せず正常終了する。
      - name: Detect Claude Code execution error
        if: env.has_token == 'true'
        env:
          EXECUTION_FILE: ${{ steps.review.outputs.execution_file }}
        run: |
          if [ -z "$EXECUTION_FILE" ] || [ ! -f "$EXECUTION_FILE" ]; then
            echo "実行結果ファイルが無いため is_error 検査をスキップします。"
            exit 0
          fi
          if jq -e '[.. | objects | select(.type? == "result") | .is_error] | any' \
              "$EXECUTION_FILE" > /dev/null; then
            echo "::error::Claude Code がエラーで終了しました（トークン失効の可能性）。secret CLAUDE_CODE_OAUTH_TOKEN を再生成してください。"
            jq '[.. | objects | select(.type? == "result")]' "$EXECUTION_FILE" || true
            exit 1
          fi
          echo "Claude Code の実行にエラーはありませんでした。"
